name: Hald Supabase aktiv

on:
  schedule:
    - cron: '0 8 */3 * *'   # Køyrer kvar 3. dag kl. 08:00 UTC
  workflow_dispatch:          # Kan også køyrast manuelt frå GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -s -o /dev/null -w "HTTP status: %{http_code}\n" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/features?limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
